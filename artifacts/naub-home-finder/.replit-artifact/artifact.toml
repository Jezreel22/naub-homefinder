kind = "web"
previewPath = "/"
title = "NAUB Home Finder"
version = "1.0.0"
id = "artifacts/naub-home-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21687

[services.development]
run = "pnpm --filter @workspace/naub-home-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/naub-home-finder", "run", "build" ]
publicDir = "artifacts/naub-home-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21687"
BASE_PATH = "/"
