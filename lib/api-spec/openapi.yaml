        reason:
          type: string
        description:
          type: string
        dispute_status:
          type: string
        adjudication_decision:
          type: ["string", "null"]
        adjudication_notes:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
        resolved_at:
          type: ["string", "null"]
