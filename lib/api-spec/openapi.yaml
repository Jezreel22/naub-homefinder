          $ref: "#/components/schemas/LandlordSummary"
        last_message:
          type: string
        last_message_at:
          type: ["string", "null"]
        unread_count:
          type: integer

    # ── Admin ────────────────────────────────────────────────────────────────
    RejectInput:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    SuspendUserInput:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    GoogleAuthInput:
      type: object
      required:
        - credential
      properties:
        credential:
          type: string
