          description: Desired role when creating a new account (defaults to student)

    KycSubmitInput:
      type: object
      required:
        - national_id_type
        - national_id_document_url
        - selfie_url
      properties:
        national_id_type:
          type: string
          enum: [nin, international_passport, drivers_licence]
        national_id_document_url:
          type: string
          description: Base64-encoded ID document image
        selfie_url:
          type: string
          description: Base64-encoded selfie image
        property_document_url:
          type: string
          description: Base64-encoded property ownership document (required for landlords)

    # ── Shared ────────────────────────────────────────────────────────────────
    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
