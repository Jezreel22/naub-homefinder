          type: ["string", "null"]
        role:
          type: string
        verification_status:
          type: ["string", "null"]
        average_rating:
          type: ["number", "null"]

    PropertyDetail:
      type: object
      properties:
        id:
          type: string
        landlord_id:
          type: string
        address:
          type: string
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        rent_amount_ngn:
          type: integer
        deposit_amount_ngn:
          type: integer
        lease_duration_days:
          type: ["integer", "null"]
        rooms:
          type: integer
        amenities:
          type: object
          additionalProperties:
            type: boolean
        house_rules:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        listing_status:
          type: string
        geolocation_verified_at:
          type: ["string", "null"]
        published_at:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
        landlord:
          $ref: "#/components/schemas/UserPublicProfile"
        trust_score:
          type: integer
        photos:
          type: array
          items:
            $ref: "#/components/schemas/PhotoItem"
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/RatingDetail"

    PhotoItem:
      type: object
      properties:
        id:
          type: string
        photo_url:
          type: string
        photo_order:
          type: integer

    CreatePropertyInput:
      type: object
      required:
        - address
        - rent_amount_ngn
        - deposit_amount_ngn
        - rooms
      properties:
        address:
          type: string
        rent_amount_ngn:
          type: integer
        deposit_amount_ngn:
          type: integer
        lease_duration_days:
          type: integer
        rooms:
          type: integer
        amenities:
          type: object
          additionalProperties:
            type: boolean
        house_rules:
          type: string
        description:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    UpdatePropertyInput:
      type: object
      properties:
        address:
          type: string
        rent_amount_ngn:
          type: integer
        deposit_amount_ngn:
          type: integer
        lease_duration_days:
          type: integer
        rooms:
          type: integer
        amenities:
          type: object
          additionalProperties:
            type: boolean
        house_rules:
          type: string
        description:
          type: string
        listing_status:
          type: string

    AddPhotosInput:
      type: object
      required:
        - photos
      properties:
        photos:
          type: array
          items:
            type: object
            properties:
              photo_url:
                type: string
              photo_order:
                type: integer

    # ── Bookings ─────────────────────────────────────────────────────────────
    CreateBookingInput:
      type: object
      required:
        - property_id
        - payment_method
        - lease_start_date
        - lease_duration_days
      properties:
        property_id:
          type: string
        payment_method:
          type: string
          enum: [stripe, flutterwave, bank_transfer]
        lease_start_date:
          type: string
        lease_duration_days:
          type: integer

    BookingDetail:
      type: object
      properties:
        id:
          type: string
        student_id:
          type: string
        property_id:
          type: string
        landlord_id:
          type: string
        lease_start_date:
          type: ["string", "null"]
        lease_duration_days:
          type: ["integer", "null"]
        rent_amount_ngn:
          type: integer
        deposit_amount_ngn:
          type: integer
        total_amount_ngn:
          type: integer
        escrow_account_reference:
          type: ["string", "null"]
        payment_method:
          type: ["string", "null"]
        booking_status:
          type: string
        dispute_status:
          type: ["string", "null"]
        occupancy_verified_at:
          type: ["string", "null"]
        escrow_released_at:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
        property:
          $ref: "#/components/schemas/PropertySummary"
        student:
          $ref: "#/components/schemas/LandlordSummary"
        landlord:
          $ref: "#/components/schemas/LandlordSummary"

    ConfirmOccupancyInput:
      type: object
      required:
        - occupancy_code
      properties:
        occupancy_code:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    FileDisputeInput:
      type: object
      required:
        - reason
        - description
      properties:
        reason:
          type: string
          enum: [property_mismatch, occupancy_not_verified, unresponsive, safety_concern, other]
        description:
          type: string
        refund_request:
          type: string
          enum: [full, partial, officer_decides]
        refund_amount:
          type: integer

