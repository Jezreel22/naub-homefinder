openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NAUB Home Finder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: properties
    description: Property listings
  - name: bookings
    description: Bookings and escrow
  - name: ratings
    description: Ratings and reviews
  - name: disputes
    description: Dispute resolution
  - name: messages
    description: In-app messaging
  - name: admin
    description: Admin / Escrow Officer operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ─────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/google:
    post:
      operationId: googleAuth
      tags: [auth]
      summary: Sign in or register with Google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthInput"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/kyc/submit:
    post:
      operationId: submitKyc
      tags: [auth]
      summary: Submit KYC documents for landlord/agent verification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycSubmitInput"
      responses:
        "200":
          description: KYC submitted for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── USERS ─────────────────────────────────────────────────────────────────
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user public profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublicProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update own profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublicProfile"

  /users/{id}/trust-score:
    get:
      operationId: getUserTrustScore
      tags: [users]
      summary: Get trust score breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trust score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustScore"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get own profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublicProfile"

  # ── PROPERTIES ────────────────────────────────────────────────────────────
  /properties:
    get:
      operationId: getProperties
      tags: [properties]
      summary: Search and browse properties
      parameters:
        - name: rent_min
          in: query
          schema:
            type: integer
        - name: rent_max
          in: query
          schema:
            type: integer
        - name: rooms
          in: query
          schema:
            type: integer
        - name: trust_score_min
          in: query
          schema:
            type: integer
        - name: landlord_type
          in: query
          schema:
            type: string
            enum: [all, landlord, agent]
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, cheapest, most_trusted]
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Property list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListResponse"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a new property listing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyInput"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get property detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Property detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProperty
      tags: [properties]
      summary: Update property listing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyInput"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyDetail"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete property listing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /properties/my:
    get:
      operationId: getMyProperties
      tags: [properties]
      summary: Get current landlord/agent's own listings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My properties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListResponse"

  /properties/{id}/photos:
    post:
      operationId: addPropertyPhotos
      tags: [properties]
      summary: Add photos to a property
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPhotosInput"
      responses:
        "201":
          description: Photos added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /properties/{id}/publish:
    post:
      operationId: publishProperty
      tags: [properties]
      summary: Submit property for review / publish it
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Submitted for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyDetail"

  # ── BOOKINGS ──────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: getBookings
      tags: [bookings]
      summary: List my bookings (student sees own, landlord sees received)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Booking list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetail"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking and initiate escrow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"

  /bookings/{id}/confirm-occupancy:
    post:
      operationId: confirmOccupancy
      tags: [bookings]
      summary: Submit occupancy verification (GPS + code)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmOccupancyInput"
      responses:
        "200":
          description: Occupancy confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
        "400":
          description: Invalid code or location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/dispute:
    post:
      operationId: fileDispute
      tags: [bookings]
      summary: File a dispute for a booking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDisputeInput"
      responses:
        "201":
          description: Dispute filed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── RATINGS ───────────────────────────────────────────────────────────────
  /ratings:
    post:
      operationId: createRating
      tags: [ratings]
      summary: Submit a post-occupancy rating
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingInput"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingDetail"
    get:
      operationId: getRatings
      tags: [ratings]
      summary: Get ratings for a user
      parameters:
        - name: ratee_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ratings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RatingDetail"

  # ── DISPUTES ──────────────────────────────────────────────────────────────
  /disputes:
    get:
      operationId: getDisputes
      tags: [disputes]
      summary: List disputes (admin sees all, others see own)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Disputes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DisputeDetail"

  /disputes/{id}:
    get:
      operationId: getDispute
      tags: [disputes]
      summary: Get dispute detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dispute detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeDetail"

  /disputes/{id}/adjudicate:
    post:
      operationId: adjudicateDispute
      tags: [disputes]
      summary: Adjudicate a dispute (escrow officer only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjudicateDisputeInput"
      responses:
        "200":
          description: Adjudicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeDetail"

  # ── MESSAGES ──────────────────────────────────────────────────────────────
  /messages:
    get:
      operationId: getConversations
      tags: [messages]
      summary: List all conversations for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationPreview"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageItem"

  /messages/{userId}:
    get:
      operationId: getConversation
      tags: [messages]
      summary: Get full message thread with a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageItem"

  # ── ADMIN ─────────────────────────────────────────────────────────────────
  /admin/verifications:
    get:
      operationId: getPendingVerifications
      tags: [admin]
      summary: List users pending verification review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending verifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPublicProfile"

  /admin/verifications/{id}/approve:
    post:
      operationId: approveVerification
      tags: [admin]
      summary: Approve a user's identity verification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/verifications/{id}/reject:
    post:
      operationId: rejectVerification
      tags: [admin]
      summary: Reject a user's identity verification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/suspend:
    post:
      operationId: suspendUser
      tags: [admin]
      summary: Suspend or ban a user account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuspendUserInput"
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/properties/{id}/approve:
    post:
      operationId: approveProperty
      tags: [admin]
      summary: Approve a pending property listing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/properties/{id}/reject:
    post:
      operationId: rejectProperty
      tags: [admin]
      summary: Reject a pending property listing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/pending-properties:
    get:
      operationId: getPendingProperties
      tags: [admin]
      summary: List properties pending review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending properties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Auth ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required:
        - email
        - password
        - role
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [student, landlord, agent, escrow_officer]
        first_name:
          type: ["string", "null"]
        last_name:
          type: ["string", "null"]
        matriculation_number:
          type: ["string", "null"]

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required:
        - message
        - user
        - token
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # ── Users ────────────────────────────────────────────────────────────────
    User:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        first_name:
          type: ["string", "null"]
        last_name:
          type: ["string", "null"]
        matriculation_number:
          type: ["string", "null"]
        verification_status:
          type: ["string", "null"]
        account_suspended:
          type: ["boolean", "null"]
        phone_number:
          type: ["string", "null"]
        profile_photo_url:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]

    UserPublicProfile:
      type: object
      required:
        - id
        - role
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        first_name:
          type: ["string", "null"]
        last_name:
          type: ["string", "null"]
        profile_photo_url:
          type: ["string", "null"]
        verification_status:
          type: ["string", "null"]
        account_suspended:
          type: ["boolean", "null"]
        national_id_document_url:
          type: ["string", "null"]
        selfie_url:
          type: ["string", "null"]
        letter_of_agency_url:
          type: ["string", "null"]
        phone_number:
          type: ["string", "null"]
        matriculation_number:
          type: ["string", "null"]
        suspension_reason:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
        trust_score:
          $ref: "#/components/schemas/TrustScore"

    UpdateUserInput:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
        profile_photo_url:
          type: string
        national_id_document_url:
          type: string
        selfie_url:
          type: string
        letter_of_agency_url:
          type: string

    TrustScore:
      type: object
      properties:
        user_id:
          type: string
        total_score:
          type: integer
        identity_verification_points:
          type: integer
        property_verification_points:
          type: integer
        transaction_completion_points:
          type: integer
        ratings_average_points:
          type: integer
        fraud_report_deduction:
          type: integer
        tenure_bonus_points:
          type: integer
        total_transactions:
          type: integer
        completed_transactions:
          type: integer
        average_rating:
          type: number
        fraud_reports_count:
          type: integer
        last_recomputed_at:
          type: ["string", "null"]

    # ── Properties ──────────────────────────────────────────────────────────
    PropertyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PropertySummary"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    PropertySummary:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        rent_amount_ngn:
          type: integer
        deposit_amount_ngn:
          type: integer
        rooms:
          type: integer
        listing_status:
          type: string
        landlord:
          $ref: "#/components/schemas/LandlordSummary"
        trust_score:
          type: integer
        hero_photo_url:
          type: ["string", "null"]
        amenities:
          type: object
          additionalProperties:
            type: boolean
        created_at:
          type: ["string", "null"]

    LandlordSummary:
      type: object
