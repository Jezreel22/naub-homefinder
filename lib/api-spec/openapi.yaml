      properties:
        booking_id:
          type: string
        ratee_id:
          type: string
        rating_type:
          type: string
          enum: [student_rates_landlord, landlord_rates_student]
        stars:
          type: integer
          minimum: 1
          maximum: 5
        review_text:
          type: string

    RatingDetail:
      type: object
      properties:
        id:
          type: string
        booking_id:
          type: string
        rater_id:
          type: string
        ratee_id:
          type: string
        rating_type:
          type: string
        stars:
          type: integer
        review_text:
          type: ["string", "null"]
        rater:
          $ref: "#/components/schemas/LandlordSummary"
        created_at:
          type: ["string", "null"]

    # ── Disputes ─────────────────────────────────────────────────────────────
    AdjudicateDisputeInput:
      type: object
      required:
        - decision
