    # ── Messages ─────────────────────────────────────────────────────────────
    SendMessageInput:
      type: object
      required:
        - recipient_id
        - message_text
      properties:
        recipient_id:
          type: string
        message_text:
          type: string
        booking_id:
          type: string

    MessageItem:
      type: object
      properties:
        id:
          type: string
        sender_id:
          type: string
        recipient_id:
          type: string
        booking_id:
          type: ["string", "null"]
        message_text:
          type: string
        message_type:
          type: string
        read_at:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
        sender:
          $ref: "#/components/schemas/LandlordSummary"

    ConversationPreview:
      type: object
      properties:
